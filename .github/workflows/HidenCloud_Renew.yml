name: HidenCloud 自动续期

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

concurrency:
  group: hidencloud-renew
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

env:
  PYTHONUNBUFFERED: "1"

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install curl_cffi requests beautifulsoup4 pynacl

      - name: Setup Xray Proxy Node
        env:
          PROXY_NODE: ${{ secrets.PROXY_NODE }}
        run: |
          if [ -z "$PROXY_NODE" ] || [[ "$PROXY_NODE" == socks* ]]; then
            echo "[INFO] 未检测到复杂协议链接，跳过 Xray 核心下载。"
            exit 0
          fi
          echo "[INFO] 正在下载 Xray 核心..."
          mkdir -p xray
          curl -L -s https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip -o xray.zip
          unzip -q xray.zip -d xray
          chmod +x ./xray/xray

      - name: Run HidenCloud Renew Script
        env:
          HIDEN_COOKIE: ${{ secrets.HIDEN_COOKIE }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          PROXY_NODE: ${{ secrets.PROXY_NODE }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python hidencloud_renew.py

      - name: Delete Old Workflow Runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 5
