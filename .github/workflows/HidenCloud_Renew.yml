name: HidenCloud 自动续期

on:
  schedule:
    # 初始每日执行一次（随后脚本会自动修改这里的 Cron 精准控制时间）
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Chrome & Cache
        uses: actions/cache@v4
        id: browser-cache
        with:
          path: |
            ~/.config/google-chrome
            ~/.cache/selenium
            saved_cookies.pkl
          key: ${{ runner.os }}-browser-cache-${{ hashFiles('**/HidenCloud_Renew.yml') }}
          restore-keys: |
            ${{ runner.os }}-browser-cache-

      - name: Install Dependencies
        run: |
          pip install seleniumbase requests bs4
          # 安装 SeleniumBase 浏览器隔离所需的运行环境
          seleniumbase install chromedriver

      - name: Setup Xray Proxy Node
        env:
          PROXY_NODE: ${{ secrets.PROXY_NODE }}
        run: |
          if [ -z "$PROXY_NODE" ]; then
            echo "[INFO] 未检测到 PROXY_NODE 变量，将采用直连模式运行。"
            exit 0
          fi

          echo "[INFO] 正在下载 Xray 核心..."
          mkdir -p xray
          curl -L -s https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip -o xray.zip
          unzip -q xray.zip -d xray
          chmod +x ./xray/xray

          echo "[INFO] 正在解析代理节点配置..."
          python3 - << 'PYEOF'
          import os
          import sys
          import json
          import base64
          from urllib.parse import parse_qs, unquote

          def mask(s):
              if len(s) <= 6: return "***"
              return s[:3] + "***" + s[-3:]

          url = os.environ.get("PROXY_NODE", "").strip()
          if not url:
              print("[ERROR] PROXY_NODE 为空")
              sys.exit(1)

          if url.startswith("vless://"):
              protocol = "vless"
              content = url[8:]
          elif url.startswith("vmess://"):
              protocol = "vmess"
              content = url[8:]
          elif url.startswith("trojan://"):
              protocol = "trojan"
              content = url[9:]
          elif url.startswith("ss://"):
              protocol = "ss"
              content = url[5:]
          elif url.startswith("socks5://") or url.startswith("socks://"):
              protocol = "socks5"
              content = url.split("://")[1].split("#")[0]
              if "@" in content:
                  server = content.split("@")[1].split(":")[0]
              else:
                  server = content.split(":")[0]
              print(f"[INFO] SOCKS5 -> {mask(server)}")
              with open("use_external_socks.txt", "w") as f:
                  f.write(url.split("#")[0])
              sys.exit(0)
          else:
              print(f"[ERROR] 不不支持的协议: {url.split('://')[0]}")
              sys.exit(1)

          if "#" in content:
              content = content.rsplit("#", 1)[0]

          config = {
              "log": {"loglevel": "warning"},
              "inbounds": [
                  {"port": 1080, "listen": "127.0.0.1", "protocol": "socks", "settings": {"udp": True}},
                  {"port": 1081, "listen": "127.0.0.1", "protocol": "http"}
              ],
              "outbounds": []
          }

          if protocol == "vless":
              uuid, rest = content.split("@", 1)
              host_port, params_str = rest.split("?", 1) if "?" in rest else (rest, "")
              address, port = host_port.rsplit(":", 1) if ":" in host_port else (host_port, "443")
              params = parse_qs(params_str)
              
              security = params.get("security", ["none"])[0]
              network = params.get("type", ["tcp"])[0]
              sni = params.get("sni", [address])[0]
              fp = params.get("fp", ["chrome"])[0]
              flow = params.get("flow", [""])[0]
              pbk = params.get("pbk", [""])[0]
              host = params.get("host", [sni])[0]
              path = unquote(params.get("path", ["/"])[0])

              print(f"[INFO] VLESS -> {mask(address)}:{port}")
              outbound = {
                  "protocol": "vless",
                  "settings": {"vnext": [{"address": address, "port": int(port), "users": [{"id": uuid, "encryption": "none"}]}]},
                  "streamSettings": {"network": network, "security": security}
              }
              if flow: outbound["settings"]["vnext"][0]["users"][0]["flow"] = flow
              if security == "reality":
                  outbound["streamSettings"]["realitySettings"] = {"serverName": sni, "fingerprint": fp, "publicKey": pbk}
              elif security == "tls":
                  outbound["streamSettings"]["tlsSettings"] = {"serverName": sni, "fingerprint": fp, "allowInsecure": False}
              if network == "ws": outbound["streamSettings"]["wsSettings"] = {"path": path, "headers": {"Host": host}}
              elif network == "grpc": outbound["streamSettings"]["grpcSettings"] = {"serviceName": params.get("serviceName", [""])[0]}
              config["outbounds"].append(outbound)

          elif protocol == "vmess":
              try:
                  padding = 4 - len(content) % 4
                  if padding != 4: content += "=" * padding
                  vm = json.loads(base64.b64decode(content).decode("utf-8"))
              except Exception as e:
                  print(f"[ERROR] VMess 解析失败: {e}"); sys.exit(1)
              
              address, port, uuid = vm.get("add", ""), int(vm.get("port", 443)), vm.get("id", "")
              network, tls = vm.get("net", "tcp"), vm.get("tls", "")
              print(f"[INFO] VMess -> {mask(address)}:{port}")
              outbound = {
                  "protocol": "vmess",
                  "settings": {"vnext": [{"address": address, "port": port, "users": [{"id": uuid, "alterId": int(vm.get("aid", 0)), "security": "auto"}]}]},
                  "streamSettings": {"network": network, "security": "tls" if tls == "tls" else "none"}
              }
              if tls == "tls":
                  outbound["streamSettings"]["tlsSettings"] = {"serverName": vm.get("sni", "") or vm.get("host", address), "fingerprint": vm.get("fp", "chrome"), "allowInsecure": False}
              if network == "ws":
                  outbound["streamSettings"]["wsSettings"] = {"path": vm.get("path", "/"), "headers": {"Host": vm.get("host", address)}}
              config["outbounds"].append(outbound)

          elif protocol == "trojan":
              password, rest = content.split("@", 1)
              host_port, params_str = rest.split("?", 1) if "?" in rest else (rest, "")
              address, port = host_port.rsplit(":", 1) if ":" in host_port else (host_port, "443")
              params = parse_qs(params_str)
              
              print(f"[INFO] Trojan -> {mask(address)}:{port}")
              outbound = {
                  "protocol": "trojan",
                  "settings": {"servers": [{"address": address, "port": int(port), "password": password}]},
                  "streamSettings": {
                      "network": params.get("type", ["tcp"])[0], "security": "tls",
                      "tlsSettings": {"serverName": params.get("sni", [address])[0], "fingerprint": params.get("fp", ["chrome"])[0], "allowInsecure": False}
                  }
              }
              if params.get("type", ["tcp"])[0] == "ws":
                  outbound["streamSettings"]["wsSettings"] = {"path": unquote(params.get("path", ["/"])[0]), "headers": {"Host": params.get("host", [address])[0]}}
              config["outbounds"].append(outbound)

          elif protocol == "ss":
              try:
                  if "@" in content:
                      encoded, server_part = content.split("@", 1)
                      method, password = base64.b64decode(encoded + "==").decode("utf-8").split(":", 1)
                      address, port = server_part.split(":", 1)
                  else:
                      user_part, server_part = base64.b64decode(content + "==").decode("utf-8").split("@", 1)
                      method, password = user_part.split(":", 1)
                      address, port = server_part.split(":", 1)
              except Exception as e:
                  print(f"[ERROR] Shadowsocks 解析失败: {e}"); sys.exit(1)

              print(f"[INFO] Shadowsocks -> {mask(address)}:{port}")
              config["outbounds"].append({
                  "protocol": "shadowsocks",
                  "settings": {"servers": [{"address": address, "port": int(port), "method": method, "password": password}]}
              })

          with open("xray_config.json", "w") as f:
              json.dump(config, f, indent=2)
          print("[INFO] ✅ 代理配置已成功生成")
          PYEOF

          if [ -f "use_external_socks.txt" ]; then
            EXTERNAL_SOCKS=$(cat use_external_socks.txt)
            echo "PROXY_SERVER=$EXTERNAL_SOCKS" >> $GITHUB_ENV
            echo "PROXY_SOCKS5_PORT=$(echo $EXTERNAL_SOCKS | rsplit ':' 1)" >> $GITHUB_ENV
            echo "[INFO] ✅ 使用外部 SOCKS5 代理"
            exit 0
          fi

          ./xray/xray run -c xray_config.json > xray.log 2>&1 &
          sleep 5

          echo "[INFO] 测试代理连接..."
          for i in 1 2 3 4 5; do
            if curl -x socks5://127.0.0.1:1080 -s --max-time 15 https://api.ipify.org > /dev/null 2>&1; then
              echo "[INFO] ✅ 代理连接成功"
              echo "PROXY_SERVER=127.0.0.1:1080" >> $GITHUB_ENV
              echo "PROXY_SOCKS5_PORT=1080" >> $GITHUB_ENV
              exit 0
            fi
            echo "[WARN] 尝试连接 $i/5..."
            sleep 3
          done

          echo "[ERROR] ❌ 代理连接失败"
          cat xray.log
          exit 1

      - name: Run HidenCloud Renew Script
        env:
          HIDENCLOUD: ${{ secrets.HIDENCLOUD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PROXY_SERVER: ${{ env.PROXY_SERVER }}
          PROXY_SOCKS5_PORT: ${{ env.PROXY_SOCKS5_PORT }}
        run: |
          python hidencloud_renew.py

      - name: Auto Push Git Update (Cron Adjust)
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 判断文件是否有改动再提交，避免无变化报错中断
          if ! git diff --exit-code .github/workflows/HidenCloud_Renew.yml; then
            git add .github/workflows/HidenCloud_Renew.yml
            git commit -m "chore: 智能调整下次自动续期时间规则 [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
            echo "[INFO] ✅ 下次定时运行时间已成功持久化更新"
          else
            echo "[INFO] 时间间隔未变动，无需提交。"
          fi

      - name: Cleanup Workflow History
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.REPO_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 2
