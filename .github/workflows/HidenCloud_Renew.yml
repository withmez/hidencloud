import os
import sys
import re
import time
import datetime
import requests
from seleniumbase import Driver

def send_telegram_notification(token, chat_id, message, screenshot_path=None):
    if not token or not chat_id:
        print("[INFO] 未配置 Telegram 推送参数，跳过通知。")
        return
    
    url = f"https://api.telegram.org/bot{token}/sendMessage"
    payload = {"chat_id": chat_id, "text": message, "parse_mode": "Markdown"}
    try:
        requests.post(url, json=payload, timeout=10)
        if screenshot_path and os.path.exists(screenshot_path):
            photo_url = f"https://api.telegram.org/bot{token}/sendPhoto"
            with open(screenshot_path, 'rb') as f:
                requests.post(photo_url, data={"chat_id": chat_id}, files={"photo": f}, timeout=15)
        print("[INFO] Telegram 通知发送成功。")
    except Exception as e:
        print(f"[WARN] Telegram 推送失败: {e}")

def update_github_cron(days_remaining):
    """
    智能分析计算剩余到期天数，提早 20 小时修改工作流 yml
    """
    if days_remaining <= 0:
        print("[WARN] 无法计算非法剩余天数，放弃时间重写。")
        return
        
    now = datetime.datetime.utcnow()
    # 提前 20 小时运行
    target_time = now + datetime.timedelta(days=days_remaining) - datetime.timedelta(hours=20)
    
    new_cron = f"{target_time.minute} {target_time.hour} {target_time.day} {target_time.month} *"
    print(f"[INFO] 智能计算下次执行 UTC 时间为: {target_time.strftime('%Y-%m-%d %H:%M:%S')}")
    print(f"[INFO] 生成的目标 Cron 表达式: '{new_cron}'")
    
    yml_path = ".github/workflows/HidenCloud_Renew.yml"
    if os.path.exists(yml_path):
        with open(yml_path, "r", encoding="utf-8") as f:
            content = f.read()
        
        updated_content = re.sub(r"- cron:\s*'[^']+'", f"- cron: '{new_cron}'", content, count=1)
        
        with open(yml_path, "w", encoding="utf-8") as f:
            f.write(updated_content)
        print("[INFO] 成功在本地修改工作流 Cron 表达式")
    else:
        print("[WARN] 未找到工作流文件，本地跳过修改")

def parse_raw_cookie(raw_cookie_str):
    """
    解析从开发者工具里复制出来的原始 Cookie 字符串
    """
    cookie_list = []
    # 移除可能存在的开头的 "Cookie: " 标签
    if raw_cookie_str.startswith("Cookie:"):
        raw_cookie_str = raw_cookie_str[7:]
        
    pairs = raw_cookie_str.strip().split(";")
    for pair in pairs:
        if "=" in pair:
            key, value = pair.split("=", 1)
            cookie_list.append({
                "name": key.strip(),
                "value": value.strip(),
                "domain": "dash.hidencloud.com",
                "path": "/"
            })
    return cookie_list

def main():
    raw_cookie = os.environ.get("HIDEN_COOKIE", "").strip()
    tg_token = os.environ.get("TG_BOT_TOKEN", "").strip()
    tg_chat_id = os.environ.get("TG_CHAT_ID", "").strip()
    proxy_server = os.environ.get("PROXY_SERVER", "").strip()
    proxy_port = os.environ.get("PROXY_SOCKS5_PORT", "").strip()

    if not raw_cookie:
        print("[ERROR] 未配置 HIDEN_COOKIE 变量，请检查 GitHub Repository Secrets")
        sys.exit(1)

    print("[INFO] 🚀 启动 HidenCloud 服务器自动化续期（Cookie 会话模式）")

    # 初始化配置浏览器
    driver_kwargs = {
        "browser": "chrome",
        "headless": True,
        "uc": True,
        "incognito": False
    }

    if proxy_server:
        print(f"[INFO] 正在挂载本地代理环境: socks5://127.0.0.1:{proxy_port}")
        driver_kwargs["proxy"] = f"127.0.0.1:{proxy_port}"

    driver = Driver(**driver_kwargs)
    driver.set_window_size(1366, 768)

    try:
        # 必须先访问一次域名，浏览器才能接受该域名的 Cookie 注入
        driver.get("https://dash.hidencloud.com/login")
        time.sleep(3)

        print("[INFO] 正在解析并注入配置的 Cookie...")
        parsed_cookies = parse_raw_cookie(raw_cookie)
        for cookie in parsed_cookies:
            try:
                driver.add_cookie(cookie)
            except Exception as e:
                print(f"[WARN] 注入 Cookie 项失败 [{cookie.get('name')}]: {e}")

        # 注入后直接跳转到 VPS 控制台主页
        print("[INFO] 正在携 Cookie 会话凭证跳转控制台...")
        driver.get("https://dash.hidencloud.com/vps")
        time.sleep(8)

        # 强校验：如果页面仍然重定向到了登录页，说明 Cookie 已经彻底失效
        if "login" in driver.current_url.lower():
            print("[ERROR] ❌ 会话注入失败或 Cookie 已过期，被重定向至登录页面")
            driver.save_screenshot("cookie_expired.png")
            send_telegram_notification(tg_token, tg_chat_id, "❌ HidenCloud 自动续期失败：Cookie 已过期失效，请重新抓取更新。", "cookie_expired.png")
            sys.exit(1)

        print("[INFO] 🎉 成功识别有效的 Cookie 登录状态")

        # 使用 BeautifulSoup 提取页面上的到期天数
        from bs4 import BeautifulSoup
        soup = BeautifulSoup(driver.page_source, "html.parser")
        
        days_text = soup.find(text=re.compile(r"(\d+)\s*days?\s*(remaining|expires)", re.I))
        days_remaining = 7 # 默认缺省值
        
        if days_text:
            match = re.search(r"(\d+)", days_text)
            if match:
                days_remaining = int(match.group(1))
                print(f"[INFO] 智能识别当前的服务器剩余健康天数: {days_remaining} 天")

        # 检索并执行续期按钮点击
        renew_buttons = [btn for btn in driver.find_elements("button") if "renew" in btn.text.lower() or "续期" in btn.text]
        
        if renew_buttons:
            renew_buttons[0].click()
            print("[INFO] 成功点击续期按钮，等待系统响应...")
            time.sleep(6)
            
            driver.save_screenshot("renew_success.png")
            success_msg = f"✅ HidenCloud 续期请求已触发成功！\n📊 运行前识别到期剩余: `{days_remaining}` 天。"
            print(f"[INFO] {success_msg}")
            
            send_telegram_notification(tg_token, tg_chat_id, success_msg, "renew_success.png")
            update_github_cron(days_remaining)
        else:
            print("[WARN] ⚠️ 页面未检索到可点击的续期按钮，可能当前时间不满足续期条件。")
            driver.save_screenshot("no_button_available.png")
            send_telegram_notification(tg_token, tg_chat_id, f"⚠️ HidenCloud 脚本已运行，但当前面板无有效续期按钮（当前剩余 `{days_remaining}` 天）。", "no_button_available.png")
            update_github_cron(days_remaining)

    except Exception as e:
        print(f"[ERROR] 脚本运行发生异常: {e}")
        try:
            driver.save_screenshot("error_exception.png")
            send_telegram_notification(tg_token, tg_chat_id, f"💥 HidenCloud 脚本异常中断: {str(e)[:100]}", "error_exception.png")
        except:
            pass
        sys.exit(1)
    finally:
        driver.quit()

if __name__ == "__main__":
    main()
