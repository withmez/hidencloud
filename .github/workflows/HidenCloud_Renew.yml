name: HidenCloud 自动续期

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

concurrency:
  group: hidencloud-renew
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

env:
  PYTHONUNBUFFERED: "1"

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install curl_cffi requests beautifulsoup4 pynacl

      - name: 安装并启动代理
        env:
          PROXY_NODE: ${{ secrets.PROXY_NODE }}
        run: |
          if [ -z "$PROXY_NODE" ]; then
            echo "[INFO] 未配置代理,直连模式"
            exit 0
          fi

          # Download and unzip the official Xray core
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -q Xray-linux-64.zip -d xray && chmod +x xray/xray

          python3 << 'PYEOF'
          import os
          import sys
          import json
          import base64
          from urllib.parse import parse_qs, unquote

          def mask(s):
              return f"{s[:2]}***{s[-2:]}" if len(s) > 4 else "****"

          url = os.environ.get("PROXY_NODE", "").strip()
          if not url:
              print("[ERROR] PROXY_NODE 为空")
              sys.exit(1)

          protocol = url.split("://")[0]
          content = url[len(protocol) + 3:]  # Adjust the slice based on the protocol length

          config = {
              "log": {"loglevel": "warning"},
              "inbounds": [
                  {"port": 1080, "listen": "127.0.0.1", "protocol": "socks", "settings": {"udp": True}},
                  {"port": 1081, "listen": "127.0.0.1", "protocol": "http"}
              ],
              "outbounds": []
          }

          if protocol == "vless":
              uuid, rest = content.split("@", 1)
              host_port, params_str = rest.split("?", 1) if "?" in rest else (rest, "")
              address, port = host_port.rsplit(":", 1) if ":" in host_port else (host_port, "443")
              params = parse_qs(params_str)
              security = params.get("security", ["none"])[0]
              network = params.get("type", ["tcp"])[0]
              sni = params.get("sni", [address])[0]
              fp = params.get("fp", ["chrome"])[0]
              path = unquote(params.get("path", ["/"])[0])
              host = params.get("host", [""])[0]

              print(f"[INFO] VLESS -> {mask(address)}:{port} (security: {security}, network: {network})")

              outbound = {
                  "protocol": "vless",
                  "settings": {
                      "vnext": [{
                          "address": address,
                          "port": int(port),
                          "users": [{"id": uuid, "encryption": "none"}]
                      }]
                  },
                  "streamSettings": {
                      "network": network,
                      "security": security
                  }
              }

              # 核心修复 1：动态补全 TLS 与 SNI 配置
              if security == "tls":
                  outbound["streamSettings"]["tlsSettings"] = {
                      "serverName": sni if sni else address,
                      "fingerprint": fp
                  }

              # 核心修复 2：动态补全 xhttp 核心传输设置
              if network == "xhttp":
                  outbound["streamSettings"]["xhttpSettings"] = {
                      "path": path,
                      "host": host if host else (sni if sni else address)
                  }
              elif network == "ws":
                  outbound["streamSettings"]["wsSettings"] = {
                      "path": path,
                      "headers": {"Host": host} if host else {}
                  }

              config["outbounds"].append(outbound)

          elif protocol == "vmess":
              # Existing VMess handling logic goes here...
              pass

          elif protocol == "trojan":
              # Existing Trojan handling logic goes here...
              pass

          elif protocol == "ss":
              # Existing Shadowsocks handling logic goes here...
              pass

          elif protocol == "hy2" or protocol == "hysteria":
              password, rest = content.split("@", 1)
              if "?" in rest:
                  host_port, params_str = rest.split("?", 1)
              else:
                  host_port, params_str = rest, ""

              address, port = host_port.rsplit(":", 1) if ":" in host_port else (host_port, "443")
              params = parse_qs(params_str)
              sni = params.get("sni", [address])[0]
              network = params.get("type", ["tcp"])[0]
              fp = params.get("fp", ["chrome"])[0]

              print(f"[INFO] Hysteria -> {mask(address)}:{port} (network: {network})")

              outbound = {
                  "protocol": "hysteria",
                  "settings": {
                      "servers": [{
                          "address": address,
                          "port": int(port),
                          "password": password
                      }]
                  },
                  "streamSettings": {
                      "network": network,
                      "security": "tls"
                  }
              }
              config["outbounds"].append(outbound)

          # Write the generated configuration to xray_config.json
          with open("xray_config.json", "w") as f:
              json.dump(config, f, indent=2)

          print("[INFO] ✅ 代理配置已生成")
          PYEOF

          # Check for the external SOCKS proxy
          if [ -f "use_external_socks.txt" ]; then
            EXTERNAL_SOCKS=$(cat use_external_socks.txt)
            echo "PROXY_SERVER=$EXTERNAL_SOCKS" >> $GITHUB_ENV
            echo "[INFO] ✅ 使用外部 SOCKS5 代理"
            exit 0
          fi

          ./xray/xray run -c xray_config.json > xray.log 2>&1 &
          sleep 5

          echo "[INFO] 测试代理连接..."
          for i in {1..5}; do
            # 核心修复 3：更换为更轻量的连通性测试端点
            if curl -x socks5://127.0.0.1:1080 -s --max-time 15 http://cp.cloudflare.com/generate_204 > /dev/null 2>&1; then
              echo "[INFO] ✅ 代理连接成功"
              echo "PROXY_SERVER=socks5://127.0.0.1:1080" >> $GITHUB_ENV
              exit 0
            fi
            echo "[WARN] 尝试 $i/5..."
            sleep 3
          done

          echo "[ERROR] ❌ 代理连接失败"
          cat xray.log
          exit 1

      - name: Run HidenCloud Renew Script
        env:
          HIDEN_COOKIE: ${{ secrets.HIDEN_COOKIE }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python hidencloud_renew.py

      - name: Delete Old Workflow Runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 5
