name: HidenCloud 自动续期

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

concurrency:
  group: hidencloud-renew
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

env:
  PYTHONUNBUFFERED: "1"

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install curl_cffi requests beautifulsoup4 pynacl

      - name: 解析 PROXY_NODE 并自适应部署内核
        env:
          PROXY_NODE: ${{ secrets.PROXY_NODE }}
        run: |
          # Check if PROXY_NODE is set
          if [ -z "${PROXY_NODE}" ]; then
            echo "[INFO] 未检测到 PROXY_NODE 变量,系统将采用纯直连模式运行。"
            echo "FINAL_PROXY=" >> $GITHUB_ENV
            exit 0
          fi

          # Convert protocol prefix to lowercase
          PROTO=$(echo "${PROXY_NODE}" | awk -F '://' '{print tolower($1)}')
          echo "[INFO] 检测到私有代理协议: ${PROTO}"

          LOCAL_PROXY="socks5://127.0.0.1:1080"

          # Deploy based on the protocol
          case "${PROTO}" in
            vless|vmess|trojan|ss)
              echo "[INFO] 正在部署 Xray-core 守护进程..."
              XRAY_LATEST=$(curl -s https://api.github.com/repos/XTLS/Xray-core/releases/latest | jq -r .tag_name)
              curl -L -H "Cache-Control: no-cache" -o /tmp/xray.zip "https://github.com/XTLS/Xray-core/releases/download/${XRAY_LATEST}/Xray-linux-64.zip"
              sudo mkdir -p /usr/local/share/xray /usr/local/bin
              sudo unzip -q /tmp/xray.zip -d /usr/local/share/xray
              sudo ln -s /usr/local/share/xray/xray /usr/local/bin/xray

              # Generate Xray configuration
              cat <<EOF > ./xray_config.json
              {
                "inbounds": [{
                  "port": 1080,
                  "protocol": "socks",
                  "settings": {"auth": "noauth", "udp": true}
                }],
                "outbounds": [{
                  "protocol": "freedom"
                }]
              }
          EOF
              nohup xray -c ./xray_config.json > ./xray.log 2>&1 &
              echo "FINAL_PROXY=${LOCAL_PROXY}" >> $GITHUB_ENV
              echo "[INFO] Xray-core 已在后台网闸端口 1080 挂载。"
              ;;
              
            hy2|hysteria2)
              echo "[INFO] 正在部署 Hysteria2 守护进程..."
              HY2_LATEST=$(curl -s https://api.github.com/repos/apernet/hysteria/releases/latest | jq -r .tag_name)
              curl -L -H "Cache-Control: no-cache" -o /tmp/hysteria "https://github.com/apernet/hysteria/releases/download/${HY2_LATEST}/hysteria-linux-amd64"
              sudo chmod +x /tmp/hysteria
              sudo mv /tmp/hysteria /usr/local/bin/hysteria

              # Generate Hysteria2 configuration
              cat <<EOF > ./hy2_config.yaml
              socks5:
                listen: 127.0.0.1:1080
            EOF
              
              nohup hysteria client -c ./hy2_config.yaml > ./hy2.log 2>&1 &
              echo "FINAL_PROXY=${LOCAL_PROXY}" >> $GITHUB_ENV
              echo "[INFO] Hysteria2 已在后台网闸端口 1080 挂载。"
              ;;
            
            socks|socks5)
              echo "[INFO] 检测为标准原生态 SOCKS5 代理,直接透传。"
              echo "FINAL_PROXY=${PROXY_NODE}" >> $GITHUB_ENV
              ;;
              
            *)
              echo "[WARN] 无法识别的协议格式,降级为直连模式。"
              echo "FINAL_PROXY=" >> $GITHUB_ENV
              ;;
          esac
          
      - name: Run HidenCloud Renew Script
        env:
          HIDEN_COOKIE: ${{ secrets.HIDEN_COOKIE }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python hidencloud_renew.py

      - name: Delete Old Workflow Runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 5
