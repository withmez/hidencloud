name: HidenCloud 终极自动续费

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

# 限制同名工作流交叉排队运行，避免多线程冲突与回写覆盖
concurrency:
  group: hidencloud-renew
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

env:
  PYTHONUNBUFFERED: "1"  # 实时输出 Python 原生日志，绝不积压缓存

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # 扩展时长，防多账号并发和网络延迟卡死

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Project Dependencies
        run: |
          pip install curl_cffi requests beautifulsoup4 pynacl

      - name: Setup Embedded Xray Engine
        env:
          PROXY_NODE: ${{ secrets.PROXY_NODE }}
        run: |
          if [ -z "$PROXY_NODE" ] || [[ "$PROXY_NODE" == socks* ]]; then
            echo "[INFO] 未检测到需要本地 Xray 核心转译的节点链接，跳过核心下载。"
            exit 0
          fi
          echo "[INFO] 正在拉取最新的官方原生 Xray 核心安全组件..."
          mkdir -p xray
          curl -L -s https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip -o xray.zip
          unzip -q xray.zip -d xray
          chmod +x ./xray/xray
          echo "[INFO] 核心引擎下载完毕。"

      - name: Execute Parallel Tasks
        env:
          HIDEN_COOKIE: ${{ secrets.HIDEN_COOKIE }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          PROXY_NODE: ${{ secrets.PROXY_NODE }}
        run: |
          python b.py

      # =======================================================
      # 高能保留：工作流运行完毕，强制清理，使历史严格保持 5 个以内
      # =======================================================
      - name: Auto Clean Actions History
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 5
