name: HidenCloud 自动续期

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

concurrency:
  group: hidencloud-renew
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

env:
  PYTHONUNBUFFERED: "1"

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install curl_cffi requests beautifulsoup4 pynacl

      - name: 安装并启动代理
        env:
          PROXY_NODE: ${{ secrets.PROXY_NODE }}
        run: |
          if [ -z "$PROXY_NODE" ]; then
            echo "[INFO] 未配置代理,直连模式"
            exit 0
          fi

          echo "[INFO] 发现 PROXY_NODE，开始下载全协议 sing-box 内核..."
          # 下载官方最新稳定版 sing-box (完美支持 vmess/vless/ss/trojan/hy2)
          SB_VERSION=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | grep -Po '"tag_name":\s*"\K[^"]*')
          SB_VER_NUM=${SB_VERSION#v}
          wget -q "https://github.com/SagerNet/sing-box/releases/download/${SB_VERSION}/sing-box-${SB_VER_NUM}-linux-amd64.tar.gz"
          tar -zxf sing-box-${SB_VER_NUM}-linux-amd64.tar.gz
          mv sing-box-${SB_VER_NUM}-linux-amd64/sing-box . && chmod +x sing-box

          python3 << 'PYEOF'
          import os
          import sys
          import json
          import base64
          from urllib.parse import parse_qs, unquote

          def mask(s):
              return f"{s[:2]}***{s[-2:]}" if len(s) > 4 else "****"

          url = os.environ.get("PROXY_NODE", "").strip()
          if not url:
              print("[ERROR] PROXY_NODE 为空")
              sys.exit(1)

          # 初始化基础 sing-box 骨架（提供 HTTP 1081 和 SOCKS5 1080 监听，完美对齐原 YML 端口）
          config = {
              "log": {"level": "warn"},
              "inbounds": [
                  {"type": "socks", "listen": "127.0.0.1", "listen_port": 1080},
                  {"type": "http", "listen": "127.0.0.1", "listen_port": 1081}
              ],
              "outbounds": []
          }

          outbound = {}

          # 兼容 hy2:// 简写
          if url.startswith("hy2://"):
              url = url.replace("hy2://", "hysteria2://", 1)

          # === 1. 解析 VLESS ===
          if url.startswith("vless://"):
              content = url[8:].split("#")[0]
              uuid, rest = content.split("@", 1)
              host_port, params_str = rest.split("?", 1) if "?" in rest else (rest, "")
              server, port = host_port.rsplit(":", 1) if ":" in host_port else (host_port, "443")
              params = parse_qs(params_str)

              print(f"[INFO] VLESS -> {mask(server)}:{port}")
              outbound = {
                  "type": "vless",
                  "server": server,
                  "server_port": int(port),
                  "uuid": uuid,
                  "flow": params.get("flow", [""])[0],
                  "tls": {
                      "enabled": True,
                      "server_name": params.get("sni", [server])[0],
                      "utls": {"enabled": True, "fingerprint": params.get("fp", ["chrome"])[0]}
                  }
              }
              if params.get("security", ["none"])[0] == "reality":
                  outbound["tls"]["reality"] = {
                      "enabled": True,
                      "public_key": params.get("pbk", [""])[0],
                      "short_id": params.get("sid", [""])[0]
                  }
              net = params.get("type", ["tcp"])[0]
              if net == "ws":
                  outbound["transport"] = {
                      "type": "ws",
                      "path": unquote(params.get("path", ["/"])[0]).split("?")[0], # 过滤多余参数
                      "headers": {"Host": params.get("host", [server])[0]}
                  }

          # === 2. 解析 VMESS ===
          elif url.startswith("vmess://"):
              content = url[8:].split("#")[0]
              padding = 4 - len(content) % 4
              if padding != 4: content += "=" * padding
              vm = json.loads(base64.b64decode(content).decode("utf-8"))
              
              print(f"[INFO] VMESS -> {mask(vm.get('add'))}:{vm.get('port')}")
              outbound = {
                  "type": "vmess",
                  "server": vm.get("add"),
                  "server_port": int(vm.get("port", 443)),
                  "uuid": vm.get("id"),
                  "security": "auto",
                  "alter_id": int(vm.get("aid", 0))
              }
              if vm.get("tls") == "tls":
                  outbound["tls"] = {
                      "enabled": True,
                      "server_name": vm.get("sni") or vm.get("host") or vm.get("add"),
                      "utls": {"enabled": True, "fingerprint": vm.get("fp", "chrome")}
                  }
              if vm.get("net") == "ws":
                  outbound["transport"] = {
                      "type": "ws",
                      "path": vm.get("path", "/").split("?")[0],
                      "headers": {"Host": vm.get("host") or vm.get("add")}
                  }

          # === 3. 解析 HYSTERIA 2 / HY2 ===
          elif url.startswith("hysteria2://"):
              content = url[12:].split("#")[0]
              password, rest = content.split("@", 1)
              host_port, params_str = rest.split("?", 1) if "?" in rest else (rest, "")
              server, port = host_port.rsplit(":", 1) if ":" in host_port else (host_port, "443")
              params = parse_qs(params_str)

              print(f"[INFO] Hysteria2 -> {mask(server)}:{port}")
              outbound = {
                  "type": "hysteria2",
                  "server": server,
                  "server_port": int(port),
                  "password": password,
                  "tls": {
                      "enabled": True,
                      "server_name": params.get("sni", [server])[0],
                      "insecure": params.get("insecure", ["0"])[0] == "1"
                  }
              }

          # === 4. 解析 TROJAN ===
          elif url.startswith("trojan://"):
              content = url[9:].split("#")[0]
              password, rest = content.split("@", 1)
              host_port, params_str = rest.split("?", 1) if "?" in rest else (rest, "")
              server, port = host_port.rsplit(":", 1) if ":" in host_port else (host_port, "443")
              params = parse_qs(params_str)

              print(f"[INFO] Trojan -> {mask(server)}:{port}")
              outbound = {
                  "type": "trojan",
                  "server": server,
                  "server_port": int(port),
                  "password": password,
                  "tls": {
                      "enabled": True,
                      "server_name": params.get("sni", [server])[0]
                  }
              }

          # === 5. 解析 SHADOWSOCKS ===
          elif url.startswith("ss://"):
              content = url[5:].split("#")[0]
              if "@" in content:
                  user_info, server_info = content.split("@", 1)
                  padding = 4 - len(user_info) % 4
                  if padding != 4: user_info += "=" * padding
                  method, password = base64.b64decode(user_info).decode("utf-8").split(":", 1)
                  server, port = server_info.split(":", 1)
              else:
                  padding = 4 - len(content) % 4
                  if padding != 4: content += "=" * padding
                  decoded = base64.b64decode(content).decode("utf-8")
                  user_info, server_info = decoded.split("@", 1)
                  method, password = user_info.split(":", 1)
                  server, port = server_info.split(":", 1)

              print(f"[INFO] Shadowsocks -> {mask(server)}:{port}")
              outbound = {
                  "type": "shadowsocks",
                  "server": server,
                  "server_port": int(port),
                  "method": method,
                  "password": password
              }

          else:
              print(f"[ERROR] 不支持的节点协议: {url}")
              sys.exit(1)

          config["outbounds"].append(outbound)
          with open("sing_config.json", "w") as f:
              json.dump(config, f, indent=2)

          print("[INFO] ✅ sing-box 清洗配置已成功转换")
          PYEOF

          # 检查外部代理白名单逻辑
          if [ -f "use_external_socks.txt" ]; then
            EXTERNAL_SOCKS=$(cat use_external_socks.txt)
            echo "PROXY_SERVER=$EXTERNAL_SOCKS" >> $GITHUB_ENV
            echo "[INFO] ✅ 使用外部 SOCKS5 代理"
            exit 0
          fi

          # 启动后台 sing-box 进程
          ./sing-box run -c sing_config.json > singbox.log 2>&1 &
          sleep 5

          echo "[INFO] 测试代理连接..."
          for i in {1..5}; do
            if curl -x socks5://127.0.0.1:1080 -s --max-time 15 https://api.ipify.org > /dev/null 2>&1; then
              echo "[INFO] ✅ 代理连接成功"
              echo "PROXY_SERVER=socks5://127.0.0.1:1080" >> $GITHUB_ENV
              exit 0
            fi
            echo "[WARN] 尝试 $i/5..."
            sleep 3
          done

          echo "[ERROR] ❌ 代理连接失败"
          cat singbox.log
          exit 1

      - name: Run HidenCloud Renew Script
        env:
          HIDEN_COOKIE: ${{ secrets.HIDEN_COOKIE }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PROXY_SERVER: ${{ env.PROXY_SERVER }}
        run: |
          python hidencloud_renew.py

      - name: Delete Old Workflow Runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 5
